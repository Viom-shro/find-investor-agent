<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Investor Data Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Investor Data Agent</h1>

      <label for="query">Investor query</label>
      <textarea
        id="query"
        rows="3"
        placeholder='Example: "Fintech investors in India investing $500k–$2M"'
      ></textarea>

      <div class="row">
        <div class="field">
          <label for="maxResults">Max search results</label>
          <input id="maxResults" type="number" min="1" max="20" value="8" />
        </div>
        <div class="field">
          <label for="maxPages">Max pages (optional)</label>
          <input id="maxPages" type="number" min="1" max="20" placeholder="blank" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="provider">LLM provider (optional)</label>
          <select id="provider">
            <option value="">Auto</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
      </div>

      <button id="runBtn" class="primary">Run</button>

      <div id="status" class="status" aria-live="polite"></div>

      <section id="results" class="results hidden">
        <h2>Extracted records</h2>
        <div class="meta" id="meta"></div>
        <table class="table" id="table">
          <thead>
            <tr>
              <th>Investor</th>
              <th>Type</th>
              <th>Stage</th>
              <th>Location</th>
              <th>Industry</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <a id="downloadLink" class="link hidden" href="#">Download CSV</a>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
